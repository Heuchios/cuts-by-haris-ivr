services:
  - type: web
    name: cuts-by-haris-ivr
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PUBLIC_BASE_URL
        sync: false
      - key: SETMORE_ENABLED
        value: "false"
      - key: SETMORE_REFRESH_TOKEN
        sync: false
      - key: SETMORE_STAFF_KEY
        sync: false
